<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimic Dice</title>
    <meta
      name="description"
      content="Aplicacion de escritorio y web para trackear combates y herramientas de mesa para Dungeons and Dragons 5e."
    />
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #120f17;
      }

      #app {
        min-height: 100vh;
      }

      .startup-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        color: #f7efdf;
        background:
          radial-gradient(circle at top left, rgba(196, 143, 58, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(94, 183, 166, 0.14), transparent 24%),
          linear-gradient(180deg, #09070c 0%, #120f17 55%, #19131d 100%);
        font-family: Georgia, "Times New Roman", serif;
      }

      .startup-shell__panel {
        width: min(34rem, 100%);
        padding: 1.6rem;
        border: 1px solid rgba(241, 224, 197, 0.22);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(30, 24, 37, 0.96), rgba(18, 14, 24, 0.96));
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.4);
      }

      .startup-shell__crest {
        display: grid;
        place-items: center;
        width: 3.1rem;
        height: 3.1rem;
        margin-bottom: 1rem;
        border: 1px solid rgba(240, 200, 121, 0.3);
        border-radius: 18px;
        background: linear-gradient(145deg, rgba(240, 200, 121, 0.2), rgba(94, 183, 166, 0.12));
        color: #f0c879;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .startup-shell__eyebrow,
      .startup-shell__title,
      .startup-shell__text {
        margin: 0;
      }

      .startup-shell__eyebrow {
        margin-bottom: 0.45rem;
        color: #f0c879;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .startup-shell__title {
        font-size: clamp(1.4rem, 3vw, 2rem);
      }

      .startup-shell__text {
        margin-top: 0.65rem;
        color: #c7bca6;
      }

      .startup-shell__bar {
        width: 100%;
        height: 0.7rem;
        margin-top: 1rem;
        overflow: hidden;
        border: 1px solid rgba(240, 200, 121, 0.2);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
      }

      .startup-shell__bar span {
        display: block;
        width: 36%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(240, 200, 121, 0.95), rgba(94, 183, 166, 0.9));
      }
    </style>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="startup-shell" role="status" aria-live="polite" aria-label="Iniciando aplicacion">
        <div class="startup-shell__panel">
          <div class="startup-shell__crest">MD</div>
          <p class="startup-shell__eyebrow">Preparando escritorio</p>
          <h1 class="startup-shell__title">Cargando Mimic Dice</h1>
          <p class="startup-shell__text">Abriendo ventana y preparando datos iniciales.</p>
          <div class="startup-shell__bar" aria-hidden="true">
            <span></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
